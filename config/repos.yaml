# Repositories tracked by the dashboard.
#
#   slug:           owner/name on github.com
#   collect:        which collectors apply (default: all of
#                   [submodules, branches, prs, actions])
#   depsRegistry:   path of a deps.yaml-style registry inside the repo
#                   (the score one also describes libossia's vendored deps)

repos:
  - slug: ossia/score
    depsRegistry: 3rdparty/deps.yaml

  - slug: ossia/libossia

  - slug: celtera/avendish

  - slug: celtera/libremidi

  - slug: ossia/actions

  - slug: ossia/dashboard

  - slug: sat-mtl/skills

  - slug: sat-mtl/carto-tcp-avendish

# Archived repositories are ignored everywhere (explicit list + discovery).
# Set to false to include them.
ignoreArchived: true

# Dynamic discovery: every repo in an org whose name matches an `include`
# glob is tracked too, resolved via the GitHub API at collect time (needs a
# token; without one this is skipped and only the explicit list above is used).
# Archived repos are skipped (unless a specific org sets includeArchived: true
# to override the global ignoreArchived). This keeps repo families
# (e.g. ossia/score-addon-*) covered without hand-maintaining a list.
orgs:
  - org: ossia
    include:
      - "score-addon-*"

# Repositories that are not tracked themselves but whose releases matter
# (used by watch.yaml `latest: git-tag:` resolvers and the SDK checks).
releaseSources:
  - ossia/score-sdk
