name: collect & deploy

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write # commit refreshed snapshot
  pull-requests: read # PR collector (GraphQL)
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Restore git commit-graph cache
        uses: actions/cache@v5
        with:
          path: .gitcache
          key: gitcache-${{ github.run_id }}
          restore-keys: gitcache-

      - run: npm ci

      - name: Collect snapshot
        env:
          # DASHBOARD_PAT (optional org/user PAT) extends coverage to private
          # repos outside this org (sat-mtl/*), which the workflow's own
          # GITHUB_TOKEN can never see.
          GITHUB_TOKEN: ${{ secrets.DASHBOARD_PAT != '' && secrets.DASHBOARD_PAT || secrets.GITHUB_TOKEN }}
        run: npm run collect

      - name: Commit refreshed snapshot
        if: github.event_name != 'push'
        run: |
          if ! git diff --quiet data/snapshot.json; then
            git config user.name "dashboard-bot"
            git config user.email "actions@github.com"
            git add data/snapshot.json
            git commit -m "data: refresh snapshot"
            git push
          fi

      - run: npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
